<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-info " background="https://cdn.vectorstock.com/i/1000v/01/18/sun-in-clouds-3d-sunny-weather-elements-white-vector-45910118.jpg">

    <!-- Header -->
    <header class="bg-primary text-white text-center p-3">
        <h1>☁️ Weather App</h1>
    </header>

    <!-- Weather Card -->
    <div class="container mt-5 d-flex justify-content-center">
        <div class="card shadow-lg p-4 text-center" style="width: 25rem; border-radius: 20px;">

            <h3 class="text-primary mb-3">Check Weather</h3>

            <!-- Input -->
            <input 
                type="text" 
                id="cityName" 
                class="form-control mb-3" 
                placeholder="Enter city name">

            <!-- Button -->
            <button 
                class="btn btn-success mb-3"
                onclick="getWeather()">
                Get Weather
            </button>

            <!-- Output -->
            <div class="bg-light p-3 rounded">
                <h4 class="text-danger">Weather Result</h4>
                <p class="text-dark">
                    🌡 Temperature: 
                    <span id="Temperature">--</span> °C
                </p>
            </div>

        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS File Connect -->
    <script src="script.js"></script>

</body>
</html>
