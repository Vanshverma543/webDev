<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />

</head>
<body class="d-flex justify-content-center align-items-center  m-5">
    <body class="  d-flex justify-content-center align-items-center bg-info-subtle p-3 m-5">

    <div class="card shadow-lg border-0 p-4 salary-card bg-secondary">

        <h1 class="text-center fw-bold mb-2 text-danger-emphasis">
            Salary Calculator
        </h1>

        <p class="text-center text-info  mb-4">
            Calculate your net salary easily 💼
        </p>


        <div class="mb-4">
            <label class="form-label fw-semibold text-info">
                Basic Salary
            </label>

            <input type="number" id="basicSalary" class="form-control form-control-lg rounded-4"
                placeholder="Enter basic salary" />
        </div>



        <button class="btn btn-danger btn-lg rounded-2 fw-bold w-100" onclick="calculateSalary()">
            Calculate Salary
        </button>


        <div id="result" class="alert alert-light rounded-4 mt-4 d-none bg-secondary">
            <h4 class="fw-bold text-center mb-4">
                Salary Breakdown 💰
            </h4>

            <h5 id="hra"></h5>

            <h5 id="da"></h5>

            <h5 id="tax"></h5>

            <h5 id="netSalary"></h5>
        </div>
    </div>

    <!-- Bootstrap JS -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <!-- JS -->

    <script src="script.js"></script>
</body>
</html>
